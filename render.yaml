services:
  - type: web
    name: face-recognition-app
    runtime: docker
    plan: free # Use the free tier
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # User will provide this in the dashboard
      - key: CLIENT_ORIGIN
        value: https://face-recognition-app.onrender.com # Update this if your service name differs
